<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${cargo.codigoCar != null ? 'Editar Cargo' : 'Nuevo Cargo'} + ' - TEVCOL'">Cargo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>

<header class="navbar">
  <div class="wrap">
    <a class="brand" th:href="@{/}">TEVCOL</a>

    <nav class="menu">
      <a th:href="@{/empleados}">Empleados</a>
      <a class="active" th:href="@{/cargos}">Cargo</a>
      <a href="#" aria-disabled="true">Cargo Empleado</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="header-box">
    <div>
      <h1 th:text="${cargo.codigoCar != null ? 'Editar Cargo' : 'Nuevo Cargo'}">Cargo</h1>
      <small>Los demás campos pueden quedar vacíos (NULL)</small>
    </div>

    <div class="actions">
      <a class="btn btn-secondary" th:href="@{/cargos}">Volver</a>
    </div>
  </section>

  <section class="form-card" style="margin-top:14px;">
    <form th:action="@{/cargos/guardar}" th:object="${cargo}" method="post">
      <input type="hidden" th:field="*{codigoCar}"/>

      <div class="grid">
        <div>
          <label>Nombre del Cargo</label>
          <input type="text" th:field="*{nombreCar}" placeholder="Ej: TRIPULANTE" required>
        </div>

        <div>
          <label>Estado</label>
          <select th:field="*{estadoCar}" required>
            <option value="ACTIVO">ACTIVO</option>
            <option value="INACTIVO">INACTIVO</option>
          </select>
        </div>

        <div>
          <label>Área</label>
          <input type="text" th:field="*{areaCar}" placeholder="Ej: LOGISTICA">
        </div>

        <div>
          <label>Proceso</label>
          <input type="text" th:field="*{procesoCar}" placeholder="Ej: LOGISTICA DE VALORES">
        </div>

        <div>
          <label>Maquinaria / Equipo</label>
          <input type="text" th:field="*{maquinariaEquipoCar}" placeholder="Ej: VEHICULO BLINDADO">
        </div>

        <div>
          <label>Nivel de Riesgo</label>
          <input type="text" th:field="*{nivelRiesgoCar}" placeholder="Ej: ALTO / MEDIO / BAJO">
        </div>

        <div style="grid-column: 1 / -1;">
          <label>Misión</label>
          <input type="text" th:field="*{misionCar}" placeholder="Describe la misión del cargo (opcional)">
        </div>
      </div>

      <div class="actions" style="margin-top:14px;">
        <button class="btn btn-primary" type="submit">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/cargos}">Cancelar</a>
      </div>
    </form>
  </section>

</main>

</body>
</html>
